name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # Frontend: deterministic install + typecheck + the supply-chain / anti-exfil
  # guard + a dependency audit. No wasm here — fast feedback on every push.
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # version comes from package.json "packageManager"
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - name: Supply-chain / anti-exfil guard
        run: pnpm check:supply-chain
      - name: Audit production dependencies (high+)
        run: pnpm audit --prod --audit-level high

  # Reproducible wasm: build the RGB engine from source TWICE with the pinned
  # toolchain (rgb-wasm/rust-toolchain.toml) + pinned crate graph (Cargo.lock) and
  # assert the two .wasm outputs are byte-identical — a determinism smoke test that
  # would catch a non-reproducible build before it ships. Then run the JS build
  # against the produced wasm so the whole bundle is exercised.
  wasm-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # rustup honors rgb-wasm/rust-toolchain.toml (auto-installs 1.91.1 + wasm32).
      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.13.0 --locked
      - name: Build wasm (1st)
        run: pnpm build:wasm
      - name: Hash 1st build
        id: h1
        run: echo "sha=$(sha256sum rgb-wasm/pkg/*_bg.wasm | awk '{print $1}')" >> "$GITHUB_OUTPUT"
      - name: Rebuild wasm (2nd)
        run: |
          rm -rf rgb-wasm/pkg
          pnpm build:wasm
      - name: Hash 2nd build
        id: h2
        run: echo "sha=$(sha256sum rgb-wasm/pkg/*_bg.wasm | awk '{print $1}')" >> "$GITHUB_OUTPUT"
      - name: Assert reproducible
        run: |
          echo "build 1: ${{ steps.h1.outputs.sha }}"
          echo "build 2: ${{ steps.h2.outputs.sha }}"
          if [ "${{ steps.h1.outputs.sha }}" != "${{ steps.h2.outputs.sha }}" ]; then
            echo "::error::wasm build is not reproducible — outputs differ across two builds"
            exit 1
          fi
      - name: JS build against the produced wasm
        run: pnpm exec tsc --noEmit && pnpm exec vite build
